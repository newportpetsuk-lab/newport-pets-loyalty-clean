<!DOCTYPE html>
<html>
<head>
<title>Newport Pets Rewards</title>

<style>

body {
    font-family: Arial;
    background-color: #f5f5f5;
    text-align: center;
}

.container {
    background: white;
    width: 350px;
    margin: 60px auto;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

.logo {
    width: 120px;
    margin-bottom: 10px;
}

h1 {
    color: #ff7a00;
}

input {
    width: 90%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background-color: #ff7a00;
    color: white;
    border: none;
    padding: 12px;
    width: 95%;
    border-radius: 6px;
    font-size: 16px;
}

button:hover {
    background-color: #e86800;
}

</style>
</head>

<body>

<div class="container">

<img src="/static/logo.png" class="logo">

<h1>Newport Pets Rewards</h1>

<p>Join our loyalty programme and collect points every time you shop.</p>

<form method="post">

<input name="forename" placeholder="Forename" required>

<input name="surname" placeholder="Surname" required>

<input name="phone" pattern="[0-9]{11}" placeholder="Phone" required>

<input type="email" name="email" placeholder="Email" required>

<button type="submit">Join Newport Pets Rewards</button>

</form>

</div>

</body>
</html>
